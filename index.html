<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="author" content="Jasim" />
    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,initial-scale=1"
    />
    <meta name="theme-color" content="#FF00FF" />
    <title>Router</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <wc-router>
      <nav class="nav">
        <ul>
          <li><a route="/">Home</a></li>
          <li><a route="/about">About</a></li>
          <!-- data-prefetch: hovering or focusing this link eagerly loads the
               lazy /contact bundle so the click renders instantly. -->
          <li><a route="/contact" data-prefetch>Contact</a></li>
          <li><a route="/users">Users</a></li>
          <li><a route="/misc">Misc</a></li>
        </ul>
      </nav>
      <wc-route path="/" title="Home" component="wc-home"></wc-route>
      <wc-route path="/about" title="About Us" component="wc-about"></wc-route>
      <!--
        Contact is the one page loaded lazily, to demonstrate code-splitting
        via resource-url. The path is resolved relative to router.js (the
        module that runs the dynamic import), so it works under any base path.
      -->
      <wc-route
        path="/contact"
        title="Contact Us"
        component="wc-contact"
        resource-url="./pages/contact.js"
      ></wc-route>
      <!--
        Nested routes: <wc-users> is a layout that renders a <wc-outlet>. The
        index child (empty path) shows for /users; the :id child shows for
        /users/<id>. Child paths are relative to the parent, and the layout
        persists while only the nested view changes.
      -->
      <wc-route path="/users" title="Users" component="wc-users">
        <wc-route path="" component="wc-userindex"></wc-route>
        <wc-route
          path=":id"
          title="User Details"
          component="wc-userdetails"
        ></wc-route>
      </wc-route>
      <!-- Redirect: the Misc link sends visitors to About (via replaceState). -->
      <wc-route path="/misc" redirect="/about"></wc-route>
      <wc-route path="*" title="404" component="wc-notfound"></wc-route>
      <wc-outlet></wc-outlet>
    </wc-router>
    <script type="module" src="./js/router.js"></script>
    <script type="module" src="./js/pages/index.js"></script>
  </body>
</html>
